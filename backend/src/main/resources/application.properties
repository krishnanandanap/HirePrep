# ============================================
# APPLICATION PROPERTIES
# ============================================

# App Name
spring.application.name=interview-mvp

# ============================================
# DATABASE — H2 (default, works out of box)
# ============================================
spring.datasource.url=jdbc:h2:mem:interviewdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ============================================
# DATABASE — MySQL (uncomment when ready)
# ============================================
# spring.datasource.url=jdbc:mysql://localhost:3306/interviewdb?createDatabaseIfNotExist=true
# spring.datasource.username=root
# spring.datasource.password=yourpassword
# spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ============================================
# JPA / HIBERNATE
# ============================================
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# ============================================
# JWT
# ============================================
app.jwt.secret=ThisIsAVeryLongSecretKeyForJWTSigningMustBe256BitsLongOrMore!
app.jwt.expiration=86400000

# ============================================
# SERVER
# ============================================
server.port=8080
